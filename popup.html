<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      min-height: 60px;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    .template-list {
      list-style: none;
      padding: 0;
      margin: 0 0 8px 0;
    }
    .template-item {
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 4px;
      border: 1px solid #ddd;
    }
    .template-item:hover {
      background-color: #e8f0fe;
      border-color: #4285f4;
    }
    .template-name {
      font-weight: bold;
      font-size: 12px;
    }
    .template-preview {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-template-item {
      background-color: #f9f9f9;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .options-link {
      font-size: 11px;
      color: #4285f4;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
    }
    .options-link:hover {
      text-decoration: underline;
    }
    .set-completed-btn {
      font-size: 11px;
      color: #fff;
      background-color: #4285f4;
      border: none;
      border-radius: 3px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .set-completed-btn:hover {
      background-color: #3367d6;
    }
    .set-completed-btn:disabled {
      background-color: #aaa;
      cursor: default;
    }
    .status-msg {
      font-size: 11px;
      margin-top: 4px;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <!-- View 1: email template selection -->
  <div id="view-mail">
    <h3>Select Mail Template</h3>
    <ul id="template-list" class="template-list">
      <li id="no-template" class="template-item no-template-item">
        <div class="template-name">No template</div>
        <div class="template-preview">Send with current page URL only</div>
      </li>
    </ul>
    <div class="footer">
      <button class="set-completed-btn" id="set-completed-btn">Set Resolved &rsaquo;</button>
      <button class="options-link" id="options-link">Manage templates &rsaquo;</button>
    </div>
  </div>

  <!-- View 2: INC Resolution selection -->
  <div id="view-resolution" style="display:none">
    <h3>Select INC Resolution</h3>
    <ul id="resolution-list" class="template-list">
      <li id="no-resolution" class="template-item no-template-item">
        <div class="template-name">No INC Resolution</div>
        <div class="template-preview">Complete without setting INC Resolution text</div>
      </li>
    </ul>
    <div class="footer">
      <button class="options-link" id="back-btn">&#8592; Back</button>
    </div>
  </div>

  <div id="set-completed-status" class="status-msg"></div>
  <script src="popup.js"></script>
</body>
</html>
