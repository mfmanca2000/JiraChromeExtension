<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      min-height: 60px;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    .template-list {
      list-style: none;
      padding: 0;
      margin: 0 0 8px 0;
    }
    .template-item {
      padding: 7px 10px;
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 4px;
      border: 1px solid #ddd;
    }
    .template-item:hover {
      background-color: #e8f0fe;
      border-color: #4285f4;
    }
    .template-name {
      font-weight: bold;
      font-size: 12px;
    }
    .template-preview {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .no-template-item {
      background-color: #f9f9f9;
    }
    .footer {
      margin-top: 6px;
      text-align: right;
    }
    .options-link {
      font-size: 11px;
      color: #4285f4;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      padding: 0;
    }
    .options-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h3>Select Mail Template</h3>
  <ul id="template-list" class="template-list">
    <li id="no-template" class="template-item no-template-item">
      <div class="template-name">No template</div>
      <div class="template-preview">Send with current page URL only</div>
    </li>
  </ul>
  <div class="footer">
    <button class="options-link" id="options-link">Manage templates &rsaquo;</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
